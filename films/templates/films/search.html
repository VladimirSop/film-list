{% extends "films/base.html" %}

{% block content %}

<h1>Результаты поиска</h1>

<a href="javascript:history.back()">← Назад</a>

{% for movie in movies %}
    <div class="card">
        <b>{{ movie.title }}</b>

        <form action="/room/{{ code }}/add/" method="post">
            {% csrf_token %}
            <input type="hidden" name="title" value="{{ movie.title }}">
            <button>Добавить</button>
        </form>
    </div>
{% endfor %}

{% endblock %}
