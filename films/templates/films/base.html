<!DOCTYPE html>
<html>
<head>
    <title>FilmList</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #141414;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .logo {
            color: #e50914;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
        }

        .nav-links a:hover {
            color: #e50914;
        }

        /* CONTAINER */
        .container {
            padding: 20px 40px;
        }

        /* CARD */
        .card {
            background: #1f1f1f;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        button {
            background: #e50914;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.8;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
            margin-right: 5px;
        }

        .section-title {
            margin-top: 30px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">FilmList</div>

    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="/">Главная</a>
            <a href="/create/">Создать комнату</a>
            <a href="/join/">Войти по коду</a>
            <a href="/logout/">Выйти</a>
        {% else %}
            <a href="/login/">Войти</a>
            <a href="/register/">Регистрация</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
